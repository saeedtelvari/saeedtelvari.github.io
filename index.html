<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telvari Portfolio — UI kit</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="icon" href="./assets/logo-minimalist.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #211d34 0%, #1c2645 50%, #1d416e 100%);
      font-family: 'Montserrat', system-ui, sans-serif;
      overflow-x: hidden;
    }
    /* Scrollbar style to match */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.20); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, rgba(100,255,218,0.30), rgba(100,255,218,0.10)); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,255,218,0.40); }

    /* Subsurface hero animations — defined globally so React re-renders can't reset them */
    @keyframes twinkle {
      0%, 100% { opacity: 0.25; }
      50%      { opacity: 0.95; }
    }
    @keyframes flow {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -160; }
    }
    @keyframes flow-reverse {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: 160; }
    }
    @keyframes fingerDrip {
      0%   { transform: translateY(0) scale(1);      opacity: 0; }
      15%  {                                         opacity: 0.55; }
      85%  { transform: translateY(120px) scale(1.3); opacity: 0.30; }
      100% { transform: translateY(140px) scale(0.3); opacity: 0; }
    }
    @keyframes cellPulse {
      0%, 100% { opacity: 0.15; transform: scale(0.85); }
      50%      { opacity: 0.95; transform: scale(1.25); }
    }
    @keyframes bubbleRise {
      0%   { transform: translate(0, 0)               scale(0.5); opacity: 0; }
      15%  { transform: translate(calc(var(--drift, 0px) * 0.10), -30px)  scale(0.85); opacity: 0.85; }
      55%  { transform: translate(calc(var(--drift, 0px) * 0.50), -160px) scale(1);    opacity: 0.75; }
      85%  { transform: translate(calc(var(--drift, 0px) * 0.85), -260px) scale(1.05); opacity: 0.40; }
      100% { transform: translate(var(--drift, 0px),              -330px) scale(1.1);  opacity: 0;    }
    }
    @keyframes streakRise {
      0%   { transform: translateY(0);      opacity: 0; }
      15%  {                                opacity: 0.75; }
      85%  { transform: translateY(-180px); opacity: 0.45; }
      100% { transform: translateY(-200px); opacity: 0; }
    }
    @keyframes faultRise {
      0%   { transform: translateY(0); opacity: 0; }
      15%  { opacity: 0.85; }
      85%  { opacity: 0.85; }
      100% { transform: translateY(var(--travel, -150px)); opacity: 0; }
    }
    @keyframes pulseFlare {
      0%, 100% { opacity: 0.65; transform: translateX(-50%) scale(1);   }
      50%      { opacity: 1;    transform: translateX(-50%) scale(1.4); }
    }
    @keyframes labelArrow {
      0%, 100% { opacity: 0.65; }
      50%      { opacity: 1; }
    }
    @keyframes feedBubble {
      0%   { transform: translateY(0); opacity: 0; }
      15%  { opacity: 0.85; }
      85%  { opacity: 0.85; }
      100% { transform: translateY(calc(42vh - 35px)); opacity: 0; }
    }
    @keyframes plumePulse {
      0%, 100% { opacity: 0.22; transform: scale(1.0); }
      50%      { opacity: 0.45; transform: scale(1.01); }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx?v=3.8"></script>
  <script type="text/babel" src="Header.jsx?v=3.8"></script>
  <script type="text/babel" src="Footer.jsx?v=3.8"></script>
  <script type="text/babel" src="SubsurfaceHero.jsx?v=3.17"></script>
  <script type="text/babel" src="HomeSections.jsx?v=3.8"></script>
  <script type="text/babel" src="CVPage.jsx?v=3.8"></script>
  <script type="text/babel" src="App.jsx?v=3.8"></script>
</body>
</html>
